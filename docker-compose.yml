services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: helicarrier
      POSTGRES_PASSWORD: helicarrier
      POSTGRES_DB: helicarrier
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helicarrier"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
